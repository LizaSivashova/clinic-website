app = "therapy-clinic"
primary_region = "ams"   # Amsterdam — closest Fly.io region to Israel

[build]

[env]
  NODE_ENV = "production"
  PORT     = "4000"
  DB_PATH  = "/data/app.sqlite"

[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    timeout      = "5s"

[[mounts]]
  source      = "app_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"   # free tier machine size
