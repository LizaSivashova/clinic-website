name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci || npm install
          npm --prefix server ci || npm --prefix server install
          npm --prefix client ci || npm --prefix client install

      # ---- Backend ----
      - name: Typecheck server
        run: npm --prefix server run typecheck

      - name: Test server
        run: npm --prefix server test

      # ---- Frontend ----
      - name: Build client
        run: npm --prefix client run build

      # ---- Server production build ----
      - name: Build server
        run: npm --prefix server run build

      # ---- Lighthouse CI ----
      - name: Start server for Lighthouse
        env:
          NODE_ENV: production
          PORT: 4000
          JWT_SECRET: ci-lighthouse-secret-at-least-16-chars
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: "$2a$10$sWCLPmHYK7cKJ82q.bXkgusfu.wrzXLQVeADjxBn4mUAsPRhypJbm"
          CLIENT_ORIGIN: http://localhost:4000
          GMAIL_USER: ""
          GMAIL_APP_PASSWORD: ""
          ADMIN_NOTIFICATION_EMAIL: ""
        run: node dist/src/server.js &
        working-directory: server

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 4000..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:4000/api/health && echo "Server ready" && break
            sleep 1
          done

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
