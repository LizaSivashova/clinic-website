# Example Fly.io config — copy to fly.toml and set your own app name.
#   cp fly.example.toml fly.toml   (fly.toml is git-ignored)

app = 'your-app-name'
primary_region = 'fra'

[build]

[env]
  DB_PATH = '/data/app.sqlite'
  NODE_ENV = 'production'
  PORT = '4000'

[[mounts]]
  source = 'app_data'
  destination = '/data'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
